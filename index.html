<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CS ITC Kiosk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="top-bar">
    <div class="banner" id="announcement-banner">
  <img class="banner-icon" src="img/1.png" alt="Announcements">
  <div class="banner-text">
    <div class="banner-label">Announcements</div>
    <div class="banner-title" id="banner-title">Welcome to CS ITC</div>
  </div>
</div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="screen-container">
    <!-- Injected by JS -->
  </main>

  <!-- BOTTOM MENU (replaces carousel) -->
  <div class="bottom-menu" id="bottom-menu">
    <button class="menu-btn" onclick="goToScreen(0)" id="menu-0">
      <img class="menu-icon" src="img/2.png" alt="Home">
      <span>Home</span>
    </button>

    <button class="menu-btn" onclick="goToScreen(1)" id="menu-1">
      <img class="menu-icon" src="img/3.png" alt="Find Room">
      <span>Find</span>
    </button>

    <button class="menu-btn" onclick="goToScreen(2)" id="menu-2">
      <img class="menu-icon" src="img/1.png" alt="Announcements">
      <span>News</span>
    </button>

    <button class="menu-btn" onclick="goToScreen(3)" id="menu-3">
      <img class="menu-icon" src="img/4.png" alt="FAQ">
      <span>FAQ</span>
    </button>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
