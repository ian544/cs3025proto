<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS ITC Kiosk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- HEADER -->
    <header class="top-bar">
        <div class="banner" id="announcement-banner">
            📢 Welcome to CS ITC
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="screen-container">
        <!-- Injected by JS -->
    </main>

    <!-- CAROUSEL CONTROLS -->
<div class="carousel-controls">

  <div class="controls-left">
    <button class="home-btn" id="home-btn" onclick="goHome()">
      <img class="home-icon" src="img/2.png" alt="Home">
    </button>
  </div>

  <div class="controls-center">
    <button class="arrow" onclick="prevScreen()">
      <img class="arrow-icon" src="img/left.png" alt="Previous">
    </button>

    <div id="screen-indicator">
      <img class="ui-icon" src="img/2.png" alt="Home">
    </div>

    <button class="arrow" onclick="nextScreen()">
      <img class="arrow-icon" src="img/right.png" alt="Next">
    </button>
  </div>

  <div class="controls-right"></div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
